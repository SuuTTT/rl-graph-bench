name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check rlgb/

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install mypy && pip install -e ".[dev]" --quiet
      - name: Type-check
        run: mypy rlgb/ --ignore-missing-imports --no-error-summary

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install PyTorch (Linux / Windows — CPU wheel)
        if: runner.os != 'macOS'
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install PyTorch (macOS — default index, supports arm64)
        if: runner.os == 'macOS'
        run: pip install torch
      - name: Install remaining dependencies
        run: |
          pip install torch_geometric
          pip install -e ".[dev]" --quiet
      - name: Run tests
        run: pytest tests/ -q --tb=short -x
        env:
          PYTHONPATH: ${{ github.workspace }}

  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric
          pip install -e ".[dev]" --quiet
      - name: CLI smoke test
        run: |
          rlgb list-algos
          rlgb list-datasets
          rlgb run --algo neurocut --dataset mini5 --steps 5 --horizon 3 --hidden 16
